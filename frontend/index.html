<!DOCTYPE html>
<html>
<head>
  <title>DistriWest Admin</title>

  <style>
    body { font-family: Arial; background:#eef2f7; padding:20px; }

    .card {
      background:white;
      padding:20px;
      border-radius:10px;
      margin-bottom:20px;
    }

    button {
      padding:10px;
      background:#1976d2;
      color:white;
      border:none;
      border-radius:6px;
      cursor:pointer;
    }

    #listaProductos {
      display:grid;
      grid-template-columns: repeat(auto-fill,minmax(200px,1fr));
      gap:15px;
    }

    .producto-card {
      background:white;
      padding:10px;
      border-radius:10px;
      text-align:center;
    }

    img {
      width:100%;
      height:120px;
      object-fit:contain;
    }
  </style>
</head>

<body>

<h1>DistriWest</h1>

<div class="card">
  <input id="categoriaNombre" placeholder="Categoría">
  <button onclick="crearCategoria()">Crear</button>
</div>

<div class="card">
  <input id="nombre" placeholder="Nombre">
  <input id="precio" placeholder="Precio">
  <input type="file" id="imagen">
  <select id="categoriaId"></select>

  <label>Oferta <input type="checkbox" id="oferta"></label>
  <label>Top <input type="checkbox" id="destacado"></label>

  <button onclick="crearProducto()">Guardar</button>
</div>

<button onclick="generarPDF()">GENERAR PDF</button>

<div id="listaProductos"></div>

<script>
const API = "https://distriwest-backend-production.up.railway.app";

async function cargarCategorias() {
  const res = await fetch(API + "/categorias");
  const data = await res.json();

  const select = document.getElementById("categoriaId");
  select.innerHTML = "";

  data.forEach(c => {
    const op = document.createElement("option");
    op.value = c.id;
    op.textContent = c.nombre;
    select.appendChild(op);
  });
}

async function crearCategoria() {
  const nombre = document.getElementById("categoriaNombre").value;

  await fetch(API + "/categorias", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ nombre })
  });

  cargarCategorias();
}

async function crearProducto() {
  let imagenUrl = null;
  const file = document.getElementById("imagen").files[0];

  if (file) {
    const form = new FormData();
    form.append("imagen", file);

    const res = await fetch(API + "/upload", {
      method:"POST",
      body: form
    });

    const data = await res.json();
    imagenUrl = data.url;
  }

  await fetch(API + "/productos", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      nombre: nombre.value,
      precio: Number(precio.value),
      categoria_id: Number(categoriaId.value),
      imagen_url: imagenUrl,
      oferta: oferta.checked,
      destacado: destacado.checked
    })
  });

  cargarProductos();
}

async function cargarProductos() {
  const res = await fetch(API + "/productos");
  const data = await res.json();

  const cont = document.getElementById("listaProductos");
  cont.innerHTML = "";

  data.forEach(p => {
    cont.innerHTML += `
      <div class="producto-card">
        <img src="${p.imagen_url}">
        <b>${p.nombre}</b>
        <p>$${p.precio}</p>
      </div>
    `;
  });
}

function generarPDF() {
  window.open(API + "/generar-pdf");
}

window.onload = () => {
  cargarCategorias();
  cargarProductos();
};
</script>

</body>
</html>
